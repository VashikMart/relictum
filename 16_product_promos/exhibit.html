<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экспонат — RELICTUM</title>
<meta name="description" content="Промо-страница экспоната RELICTUM: история, эпоха, размещение в интерьере.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0A0908; --coal:#14110E; --ivory:#F4F0E8; --bone:#FBF8F1; --bronze:#B08A55; --gold:#E9C98A; --deep:#8F6530;
  --mist:rgba(244,240,232,.66); --line:rgba(176,138,85,.22); --linel:rgba(143,101,48,.26);
  --serif:'Cormorant Garamond',serif; --sans:'Inter',sans-serif; --ease:cubic-bezier(.23,1,.32,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:#14110E;font-family:var(--sans);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img,video{max-width:100%;display:block}
h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.06}
a{color:inherit;text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(18px,4.5vw,56px)}
.label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--deep)}

/* top bar */
.top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px clamp(16px,4vw,44px);background:linear-gradient(180deg,rgba(244,240,232,.94),rgba(244,240,232,0));backdrop-filter:blur(6px)}
.top a.bk{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5c554a}
.top .mk{font-family:var(--serif);letter-spacing:.3em;font-size:15px}

/* reveal */
.rv{opacity:0;transform:translateY(26px);transition:opacity 1s var(--ease),transform 1s var(--ease)}
.rv.in{opacity:1;transform:none}

/* hero */
.hero{min-height:100svh;display:grid;grid-template-columns:1fr 1.02fr;align-items:center;gap:clamp(24px,4vw,64px);padding:96px clamp(18px,4.5vw,56px) 48px;max-width:1240px;margin:0 auto}
@media(max-width:900px){.hero{grid-template-columns:1fr;min-height:auto;padding-top:96px;gap:24px}}
.hero .txt .kick{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--deep);margin-bottom:16px}
.hero h1{font-size:clamp(40px,6.6vw,72px);margin-bottom:8px}
.hero .lat{font-family:var(--serif);font-style:italic;font-size:clamp(18px,2.1vw,25px);color:var(--deep);margin-bottom:22px}
.hero .hook{font-size:clamp(15px,1.9vw,18.5px);color:#3d3a35;max-width:44ch;margin-bottom:26px}
.hero .ph{background:var(--bone);border:1px solid var(--linel);overflow:hidden;position:relative}
.hero .ph img,.hero .ph video{width:100%;aspect-ratio:4/5;object-fit:cover;display:block}
.hero .ph.vid{background:#0A0908;border-color:rgba(176,138,85,.35)}
.hero .ph video{position:absolute;inset:0;height:100%;opacity:0;transition:opacity .8s}
.hero .ph video.on{opacity:1}
.scrollcue{font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:#8a8175;display:inline-flex;align-items:center;gap:8px}
.scrollcue::after{content:'';width:1px;height:24px;background:var(--deep);display:inline-block;animation:cue 2s ease-in-out infinite}
@keyframes cue{0%,100%{transform:scaleY(.4);opacity:.4}50%{transform:scaleY(1);opacity:1}}

/* паспорт */
.pass{background:var(--bone);border-top:1px solid var(--linel);border-bottom:1px solid var(--linel);padding:clamp(44px,6vw,72px) 0}
.pass .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(18px,3vw,40px)}
@media(max-width:760px){.pass .grid{grid-template-columns:1fr 1fr;gap:24px}}
.pass .cell .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--deep);margin-bottom:8px}
.pass .cell .v{font-family:var(--serif);font-size:clamp(19px,2.4vw,26px);line-height:1.15}

/* story */
.story{padding:clamp(60px,9vw,120px) 0}
.story .in2{max-width:720px}
.story h2{font-size:clamp(28px,4.4vw,46px);margin-bottom:26px}
.story p{font-size:clamp(14.5px,1.7vw,16.5px);color:#3d3a35;margin-bottom:18px}
.story .eratag{display:inline-flex;align-items:baseline;gap:12px;margin-top:14px;padding-top:20px;border-top:1px solid var(--linel)}
.story .eratag b{font-family:var(--serif);font-size:22px;font-weight:400}
.story .eratag span{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--deep)}

/* alive — тёмная секция с видео */
.alive{position:relative;min-height:100svh;display:grid;place-items:center;text-align:center;overflow:hidden;background:var(--black);color:var(--ivory)}
.alive video,.alive .poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.alive .veil{position:absolute;inset:0;z-index:1;background:radial-gradient(120% 90% at 50% 40%,rgba(10,9,8,.35),rgba(10,9,8,.82))}
.alive .in{position:relative;z-index:2;padding:90px 22px;max-width:640px}
.alive .label{color:var(--gold)}
.alive h2{font-size:clamp(32px,6vw,64px);margin:14px 0 18px;text-shadow:0 2px 30px rgba(0,0,0,.6)}
.alive p{color:var(--mist);max-width:42ch;margin:0 auto 30px}
.btn{display:inline-block;padding:15px 34px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;border:1px solid currentColor;transition:.4s var(--ease);cursor:pointer}
.alive .btn{color:var(--gold);border-color:var(--bronze)}
.alive .btn:hover{background:var(--gold);color:var(--black);border-color:var(--gold)}

/* дома */
.home{padding:clamp(56px,8vw,110px) 0}
.home .big{border:1px solid var(--linel);overflow:hidden;margin-bottom:26px;position:relative}
.home .big img,.home .big video{width:100%;aspect-ratio:16/8.4;object-fit:cover;display:block}
.home .big video{position:absolute;inset:0;height:100%;opacity:0;transition:opacity .8s}
.home .big video.on{opacity:1}
.home .cap{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:start;max-width:820px}
@media(max-width:680px){.home .cap{grid-template-columns:1fr;gap:10px}}
.home .cap h3{font-size:clamp(22px,3vw,30px);white-space:nowrap}
.home .cap p{font-size:14.5px;color:#3d3a35}

/* галерея ракурсов */
.gallery{padding:0 0 clamp(30px,5vw,60px)}
.gallery .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.gallery .ggrid{grid-template-columns:1fr}}
.gallery .gitem{border:1px solid var(--linel);overflow:hidden;background:var(--bone)}
.gallery .gitem img{width:100%;aspect-ratio:3/2;object-fit:cover;transition:transform .8s var(--ease)}
.gallery .gitem:hover img{transform:scale(1.04)}

/* CTA / сервис */
.cta{background:var(--coal);color:var(--ivory);padding:clamp(56px,8vw,104px) 0;text-align:center}
.cta .price{font-family:var(--serif);font-size:clamp(30px,4vw,46px);margin-bottom:6px}
.cta .note{font-size:12px;color:var(--mist);margin-bottom:30px}
.cta .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:52px}
.cta .btn.solid{background:var(--gold);color:var(--black);border-color:var(--gold)}
.cta .btn.solid:hover{background:#fff;border-color:#fff}
.cta .btn.ghost{color:var(--ivory)}
.cta .btn.ghost:hover{background:var(--ivory);color:var(--black)}
.cta button.btn{font-family:inherit;cursor:pointer;background:transparent}
.svc{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:820px;margin:0 auto;border-top:1px solid rgba(176,138,85,.3);padding-top:44px}
@media(max-width:680px){.svc{grid-template-columns:1fr;gap:24px}}
.svc .s b{font-family:var(--serif);font-size:20px;font-weight:400;display:block;margin-bottom:6px;color:var(--gold)}
.svc .s p{font-size:12.5px;color:var(--mist)}
.foot{text-align:center;padding:34px 0;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#8a8175}

.err{min-height:100svh;display:grid;place-items:center;text-align:center;padding:40px}
</style>

<!-- rl-seo -->
<link rel="icon" type="image/png" sizes="32x32" href="../shared/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../shared/brand/favicon-16.png">
<link rel="icon" href="../shared/brand/favicon.ico">
<link rel="apple-touch-icon" href="../shared/brand/apple-touch-icon.png">
<meta name="theme-color" content="#0A0908">
<link rel="canonical" href="https://vashikmart.github.io/relictum/16_product_promos/exhibit.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="RELICTUM">
<meta property="og:title" content="Экспонат — RELICTUM">
<meta property="og:description" content="Промо-страница экспоната RELICTUM: история, эпоха, размещение в интерьере.">
<meta property="og:image" content="https://vashikmart.github.io/relictum/shared/img/hero_light_ivory.jpg">
<meta property="og:url" content="https://vashikmart.github.io/relictum/16_product_promos/exhibit.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Экспонат — RELICTUM">
<meta name="twitter:description" content="Промо-страница экспоната RELICTUM: история, эпоха, размещение в интерьере.">
<meta name="twitter:image" content="https://vashikmart.github.io/relictum/shared/img/hero_light_ivory.jpg">
</head>
<body>

<div class="top">
  <a class="bk" href="../02_site_v1_gallery/catalog.html">← Каталог</a>
  <a class="mk" href="../index.html">RELICTUM</a>
  <span class="rl-shopnav" style="color:#5c554a"></span>
</div>

<main id="app"><div class="err"><p>Загрузка…</p></div></main>

<script src="../shared/catalog.js"></script>
<script src="promo-data.js"></script>
<script src="../shared/shop.js"></script>
<script>
function q(){if(window.RL_FORCE_ID)return window.RL_FORCE_ID;var p=new URLSearchParams(location.search);return p.get('id');}
function find(id){
  var C=window.RELICTUM_CATALOG||[];
  if(id){var o=C.find(function(x){return x.id===id||x.slug===id});if(o)return o;}
  return null;
}
var IMG='../shared/img/';
var id=q(); var o=find(id); var P=(window.RELICTUM_PROMO||{})[o&&o.id];
var app=document.getElementById('app');

if(!o){
  app.innerHTML='<div class="err"><div><div class="label">Экспонат не найден</div><h1 style="font-size:34px;margin:12px 0">Вернуться в каталог</h1><a class="btn" style="border-color:#14110E" href="../02_site_v1_gallery/catalog.html">Открыть каталог</a></div></div>';
}else{
  document.title=o.name+' · '+o.id+' — RELICTUM';
  var hook = P?P.hook : (o.description||'');
  var kick = P?P.heroKicker : (o.worldLabel+' · '+(o.region||''));
  var storyHtml = P?P.story.map(function(t){return '<p>'+t+'</p>'}).join('') : '<p>'+(o.description||'')+'</p>';
  var alive = P?P.alive:null;
  var era = P?P.era:null;
  var interior = P?P.interior:null;
  var gallery = P?P.gallery:null;

  var passCells=[
    ['Эпоха', o.period||'—'],
    ['Возраст', o.age||'—'],
    ['Происхождение', o.location||o.region||'—'],
    ['Размер', o.size||'—']
  ].map(function(c){return '<div class="cell rv"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+'</div></div>'}).join('');

  var aliveSec = alive ? (
    '<section class="alive" id="aliveSec" data-video="'+(alive.video?IMG+alive.video:'')+'">'+
      (alive.poster?'<img class="poster" src="'+IMG+alive.poster+'" alt="">':'')+
      '<div class="veil"></div>'+
      '<div class="in rv">'+
        '<div class="label">Встретить живым</div>'+
        '<h2>'+alive.title+'</h2>'+
        '<p>'+alive.text+'</p>'+
        (era&&era.href?'<a class="btn" href="'+era.href+'">Войти в эпоху →</a>':'')+
      '</div>'+
    '</section>') : '';

  var homeSec = interior ? (
    '<section class="home"><div class="wrap">'+
      '<div class="label rv" style="margin-bottom:18px">В вашем доме</div>'+
      '<div class="big rv" id="intBig"'+(interior.video?' data-video="'+IMG+interior.video+'"':'')+'><img src="'+IMG+interior.img+'" alt="'+o.name+' в интерьере" loading="lazy"></div>'+
      '<div class="cap rv"><h3>Как это живёт дома</h3><p>'+interior.text+'</p></div>'+
    '</div></section>') : '';

  var gallerySec = (gallery&&gallery.length) ? (
    '<section class="gallery"><div class="wrap">'+
      '<div class="label rv" style="margin-bottom:16px">Ещё ракурсы в интерьере</div>'+
      '<div class="ggrid">'+
        gallery.map(function(g){return '<div class="gitem rv"><img src="'+IMG+g+'" alt="'+o.name+' — ракурс" loading="lazy"></div>'}).join('')+
      '</div>'+
    '</div></section>') : '';

  app.innerHTML=
  '<section class="hero">'+
    '<div class="txt">'+
      '<div class="kick rv">'+kick+'</div>'+
      '<h1 class="rv">'+o.name+'</h1>'+
      '<div class="lat rv">'+(o.latin||'')+'</div>'+
      '<p class="hook rv">'+hook+'</p>'+
      '<div class="rv"><span class="scrollcue">Листайте</span></div>'+
    '</div>'+
    '<div class="ph rv'+(P&&P.heroVideo?' vid':'')+'"><img src="'+IMG+o.img+'.jpg?v=3" alt="'+o.name+'">'+
      (P&&P.heroVideo?'<video id="heroVid" muted loop playsinline preload="auto" src="'+IMG+P.heroVideo+'"></video>':'')+
    '</div>'+
  '</section>'+

  '<section class="pass"><div class="wrap"><div class="grid">'+passCells+'</div></div></section>'+

  '<section class="story"><div class="wrap"><div class="in2">'+
    '<div class="label rv" style="margin-bottom:16px">История</div>'+
    '<h2 class="rv">'+(P&&P.era?P.era.title:o.name)+'</h2>'+
    '<div class="rv">'+storyHtml+'</div>'+
    (era?'<div class="eratag rv"><b>'+era.title+'</b><span>'+era.line+'</span></div>':'')+
  '</div></div></section>'+

  aliveSec+ homeSec+ gallerySec+

  '<section class="cta"><div class="wrap">'+
    '<div class="label rv" style="color:var(--gold);margin-bottom:14px">'+o.id+'</div>'+
    '<div class="price rv">'+(o.price||'Цена по запросу')+'</div>'+
    '<div class="note rv">Один экземпляр · паспорт объекта · доставка и установка домом Relictum</div>'+
    '<div class="row rv">'+
      '<button type="button" class="btn solid" id="exCart">Добавить в корзину</button>'+
      '<button type="button" class="btn ghost" id="exFav">В избранное ♡</button>'+
      '<a class="btn ghost" href="mailto:hello@relictum.ru?subject=Запрос: '+encodeURIComponent(o.name+' ('+o.id+')')+'">Запросить объект</a>'+
    '</div>'+
    '<div class="svc">'+
      '<div class="s rv"><b>Провенанс</b><p>Паспорт объекта с экспертизой, происхождением и печатью дома.</p></div>'+
      '<div class="s rv"><b>Оправа и свет</b><p>Подставка, витрина или настенное крепление по вашему пространству.</p></div>'+
      '<div class="s rv"><b>Доставка</b><p>Упаковка музейного класса, логистика и установка на месте.</p></div>'+
    '</div>'+
  '</div></section>'+
  '<div class="foot">RELICTUM · Роскошь вне времени</div>';

  /* reveal on scroll (без IntersectionObserver — превью его морозит) */
  var rvs=[].slice.call(document.querySelectorAll('.rv'));
  function onScroll(){
    var vh=window.innerHeight;
    rvs.forEach(function(el){
      var r=el.getBoundingClientRect();
      if(r.top<vh*0.88 && r.bottom>0) el.classList.add('in');
    });
    /* lazy video в alive-секции */
    var a=document.getElementById('aliveSec');
    if(a && !a.dataset.loaded){
      var r=a.getBoundingClientRect();
      if(r.top<vh*1.2 && r.bottom>0){
        var src=a.dataset.video;
        if(src){
          var v=document.createElement('video');
          v.muted=true;v.loop=true;v.playsInline=true;v.setAttribute('playsinline','');v.autoplay=true;v.preload='auto';
          v.src=src;
          var pst=a.querySelector('.poster');
          v.addEventListener('canplay',function(){if(pst)pst.style.opacity='0';v.play().catch(function(){});});
          a.insertBefore(v,a.querySelector('.veil'));
        }
        a.dataset.loaded='1';
      }
    }
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  window.addEventListener('resize',onScroll);
  onScroll();

  /* хиро-видео: играть сразу как готово */
  var hv=document.getElementById('heroVid');
  if(hv){
    hv.addEventListener('canplay',function(){hv.classList.add('on');hv.play().catch(function(){});});
    hv.load();
    window.addEventListener('pointerdown',function(){hv.play().catch(function(){});},{once:true,passive:true});
  }
  /* интерьерное видео: лениво при подходе к секции */
  var ib=document.getElementById('intBig');
  if(ib && ib.dataset.video){
    var ibLoaded=false;
    var ibCheck=function(){
      if(ibLoaded)return; var r=ib.getBoundingClientRect();
      if(r.top<window.innerHeight*1.2 && r.bottom>0){
        ibLoaded=true;
        var v=document.createElement('video'); v.muted=true;v.loop=true;v.playsInline=true;v.setAttribute('playsinline','');v.autoplay=true;v.preload='auto';v.src=ib.dataset.video;
        v.addEventListener('canplay',function(){v.classList.add('on');v.play().catch(function(){});});
        ib.appendChild(v);
      }
    };
    window.addEventListener('scroll',ibCheck,{passive:true}); ibCheck();
  }

  if(window.RelictumShop){
    var Sx=window.RelictumShop;
    var exRender=function(){
      var c=document.getElementById('exCart'), fb=document.getElementById('exFav');
      if(!c||!fb) return;
      if(Sx.inCart(o.id)){ c.textContent='В корзине ✓ · перейти'; c.onclick=function(){location.href='../02_site_v1_gallery/cart.html';}; }
      else { c.textContent='Добавить в корзину'; c.onclick=function(){ Sx.addToCart(o.id); Sx.toast('«'+o.name+'» в корзине'); exRender(); }; }
      fb.textContent = Sx.inFav(o.id)?'В избранном ♥':'В избранное ♡';
      fb.onclick=function(){ var on=Sx.toggleFav(o.id); Sx.toast(on?'Добавлено в избранное':'Убрано из избранного'); exRender(); };
    };
    exRender();
  }
}
</script>
<script src="../shared/nav.js"></script>
</body>
</html>
